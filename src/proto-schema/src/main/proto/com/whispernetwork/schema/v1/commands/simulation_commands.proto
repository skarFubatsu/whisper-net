syntax = "proto3";

package com.whispernetwork.schema.v1;

option java_multiple_files = true;
option java_package = "com.whispernetwork.schema.v1.commands";

message SimulationRequestedCommand {
  string network_id = 1;
  int32 network_version_number = 2;
  string requested_by_actor_id = 3;
  string client_request_id = 4;
  int32 requested_ticks = 5;
}

message SimulationCancelRequestedCommand {
  string simulation_run_id = 1;
  string network_id = 2;
  string requested_by_actor_id = 3;
  string client_request_id = 4;
}
